name: Publish Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Check npm version
        id: npm-version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published; skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is not published; publishing."
          fi

      - name: Enable Corepack
        if: steps.npm-version.outputs.published == 'false'
        run: corepack enable

      - name: Install dependencies
        if: steps.npm-version.outputs.published == 'false'
        run: pnpm install --frozen-lockfile

      - name: Publish
        if: steps.npm-version.outputs.published == 'false'
        run: pnpm release
